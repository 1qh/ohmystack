name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_full:
        description: Run all jobs regardless of path filters
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      ts: ${{ steps.filter.outputs.ts }}
      swift: ${{ steps.filter.outputs.swift }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ts:
              - 'lib/**'
              - 'backend/**'
              - 'tool/**'
              - 'web/**'
              - 'expo/**'
              - 'doc/**'
              - 'agent/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig*.json'
              - 'turbo.json'
              - 'lintmax.config.ts'
              - 'eslint.config.ts'
            swift:
              - 'mobile/**'
              - 'swiftcore/**'
              - '.swiftlint.yml'
              - '.swiftformat'
            desktop:
              - 'desktop/**'
              - 'swiftcore/**'
              - '.swiftlint.yml'
              - '.swiftformat'
  lint:
    needs: changes
    if: needs.changes.outputs.ts == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_full == 'true')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          bun-version: 'latest'
      - run: bun i
      - run: bun run check
  typecheck-build:
    needs: [changes, lint]
    if: needs.changes.outputs.ts == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_full == 'true')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          bun-version: 'latest'
      - run: bun i
      - run: bun turbo typecheck build --output-logs=errors-only
  test:
    needs: changes
    if: needs.changes.outputs.ts == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_full == 'true')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          bun-version: 'latest'
      - run: bun i
      - run: bun --cwd lib/convex test
      - run: bun --cwd lib/spacetimedb test
  ui-sync-check:
    needs: changes
    if: needs.changes.outputs.ts == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_full == 'true')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          bun-version: 'latest'
      - run: bun i
      - run: bun ui:sync:check
  rnr-sync-check:
    needs: changes
    if: needs.changes.outputs.ts == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_full == 'true')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          bun-version: 'latest'
      - run: bun i
      - run: bun rnr:sync:check
  lint-swift:
    needs: changes
    if: needs.changes.outputs.swift == 'true' || needs.changes.outputs.desktop == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_full == 'true')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: brew install swiftformat swiftlint yamllint
      - run: swiftformat --lint . && swiftlint lint --strict && yamllint .
  build-desktop:
    needs: [changes, lint-swift]
    if: needs.changes.outputs.desktop == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_full == 'true')
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      matrix:
        app: [blog, chat, movie, org]
    steps:
      - uses: actions/checkout@v6
      - run: rm -rf ~/Library/Caches/org.swift.swiftpm/repositories
      - run: swift build --package-path desktop/convex/${{ matrix.app }}
  test-desktop:
    needs: [changes, build-desktop]
    if: needs.changes.outputs.desktop == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_full == 'true')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: swift test --package-path swiftcore
      - run: swift test --package-path desktop/convex/shared
  build-mobile:
    needs: [changes, lint-swift]
    if: needs.changes.outputs.swift == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_full == 'true')
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      matrix:
        app: [blog, chat, movie, org]
    steps:
      - uses: actions/checkout@v6
      - run: brew install skiptools/skip/skip
      - run: swift build --package-path mobile/convex/${{ matrix.app }}
