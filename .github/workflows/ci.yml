name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      ts: ${{ steps.filter.outputs.ts }}
      swift: ${{ steps.filter.outputs.swift }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ts:
              - 'packages/**'
              - 'apps/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig*.json'
              - 'turbo.json'
              - 'lintmax.config.ts'
              - 'eslint.config.ts'
            swift:
              - 'mobile/**'
              - 'swift-core/**'
              - '.swiftlint.yml'
              - '.swiftformat'
            desktop:
              - 'desktop/**'
              - 'swift-core/**'
              - '.swiftlint.yml'
              - '.swiftformat'

  lint:
    needs: changes
    if: needs.changes.outputs.ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun i --frozen-lockfile
      - run: bun run check

  typecheck-build:
    needs: [changes, lint]
    if: needs.changes.outputs.ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun i --frozen-lockfile
      - run: bun tsc
      - run: bun build:ts -- --filter='!@a/convex-*' --filter='!@a/stdb-*' --filter='!@a/docs' --output-logs=errors-only

  test:
    needs: changes
    if: needs.changes.outputs.ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun i --frozen-lockfile
      - run: bun --cwd packages/convex test
      - run: bun --cwd packages/spacetimedb test

  lint-swift:
    needs: changes
    if: needs.changes.outputs.swift == 'true' || needs.changes.outputs.desktop == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install swiftformat swiftlint yamllint
      - run: swiftformat --lint . && swiftlint lint --strict && yamllint .

  build-desktop:
    needs: [changes, lint-swift]
    if: needs.changes.outputs.desktop == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      matrix:
        app: [blog, chat, movie, org]
    steps:
      - uses: actions/checkout@v4
      - run: rm -rf ~/Library/Caches/org.swift.swiftpm/repositories
      - run: swift build --package-path desktop/convex/${{ matrix.app }}

  test-desktop:
    needs: [changes, build-desktop]
    if: needs.changes.outputs.desktop == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: swift test --package-path swift-core
      - run: swift test --package-path desktop/convex/shared

  build-mobile:
    needs: [changes, lint-swift]
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      matrix:
        app:
          - { dir: blog, scheme: App }
          - { dir: chat, scheme: App }
          - { dir: movie, scheme: App }
          - { dir: org, scheme: App }
    steps:
      - uses: actions/checkout@v4
      - run: brew install skiptools/skip/skip
      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace "mobile/convex/${{ matrix.app.dir }}/Project.xcworkspace" \
            -scheme "${{ matrix.app.scheme }}" -quiet || true
      - name: Build ${{ matrix.app.dir }}
        run: |
          xcodebuild build \
            -workspace "mobile/convex/${{ matrix.app.dir }}/Project.xcworkspace" \
            -scheme "${{ matrix.app.scheme }}" \
            -destination "generic/platform=iOS Simulator" \
            -skipMacroValidation -skipPackagePluginValidation \
            CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            ARCHS=arm64 SKIP_ACTION=build -quiet
