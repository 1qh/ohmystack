name: RNR Sync
on:
  schedule:
    - cron: '0 3 * * 2,5'
  workflow_dispatch:
concurrency:
  group: rnr-sync
  cancel-in-progress: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          bun-version: 'latest'
      - run: bun i
      - run: bun rnr:sync
      - run: bun fix
      - run: bun test
      - uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/rnr-sync
          commit-message: 'chore: sync rnr components from upstream'
          title: 'chore: sync rnr components from upstream'
          body: |
            Automated sync from React Native Reusables.
            
            - Regenerated `lib/rnr` with `bun rnr:sync`
            - Verified with `bun fix`
            - Verified with `bun test`
          labels: dependencies
          delete-branch: true
