appId: dev.noboil.mobile.stdb.chat
---
- launchApp
- assertVisible:
    id: "chat-home-page"
- tapOn:
    id: "chat-input"
- inputText: "Chat message 17"
- tapOn:
    id: "send-button"
- extendedWaitUntil:
    visible:
      id: "chat-page"
    timeout: 15000
- assertVisible:
    id: "chat-page"
- back
- assertVisible:
    id: "chat-home-page"
- assertVisible:
    id: "chat-item"
