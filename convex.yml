services:
  postgres:
    image: postgres:alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - convex-net
  convex-minio:
    image: minio/minio:latest
    restart: unless-stopped
    entrypoint: /bin/sh -c "mkdir -p /data/${S3_BUCKET_EXPORTS} /data/${S3_BUCKET_IMPORTS} /data/${S3_BUCKET_MODULES} /data/${S3_BUCKET_FILES} /data/${S3_BUCKET_SEARCH} && minio server /data --console-address ':${CONTAINER_PORT_MINIO_CONSOLE}'"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    volumes:
      - convex_minio_data:/data
    ports:
      - ${PORT_MINIO}:${CONTAINER_PORT_MINIO}
      - ${PORT_MINIO_CONSOLE}:${CONTAINER_PORT_MINIO_CONSOLE}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - convex-net
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGINT
    depends_on:
      postgres:
        condition: service_healthy
      convex-minio:
        condition: service_healthy
    ports:
      - ${PORT_CONVEX_API}:${CONTAINER_PORT_CONVEX_API}
      - ${PORT_CONVEX_SITE}:${CONTAINER_PORT_CONVEX_SITE}
    volumes:
      - convex_data:/convex/data
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      AWS_REGION: us-east-1
      AWS_S3_DISABLE_CHECKSUMS: "true"
      AWS_S3_DISABLE_SSE: "true"
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      CONVEX_CLOUD_ORIGIN: http://127.0.0.1:${PORT_CONVEX_API}
      CONVEX_SITE_ORIGIN: http://127.0.0.1:${PORT_CONVEX_SITE}
      DOCUMENT_RETENTION_DELAY: "172800"
      DO_NOT_REQUIRE_SSL: 1
      POSTGRES_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:${CONTAINER_PORT_POSTGRES}
      RUST_LOG: info
      S3_ENDPOINT_URL: http://convex-minio:${CONTAINER_PORT_MINIO}
      S3_STORAGE_EXPORTS_BUCKET: ${S3_BUCKET_EXPORTS}
      S3_STORAGE_FILES_BUCKET: ${S3_BUCKET_FILES}
      S3_STORAGE_MODULES_BUCKET: ${S3_BUCKET_MODULES}
      S3_STORAGE_SEARCH_BUCKET: ${S3_BUCKET_SEARCH}
      S3_STORAGE_SNAPSHOT_IMPORTS_BUCKET: ${S3_BUCKET_IMPORTS}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${CONTAINER_PORT_CONVEX_API}/version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - convex-net
  backend-loopback:
    image: alpine/socat
    restart: unless-stopped
    command: "tcp-listen:${PORT_CONVEX_SITE},fork,reuseaddr tcp-connect:localhost:${CONTAINER_PORT_CONVEX_SITE}"
    network_mode: "service:backend"
    depends_on:
      backend:
        condition: service_healthy
  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGINT
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - ${PORT_CONVEX_DASHBOARD}:${CONTAINER_PORT_CONVEX_DASHBOARD}
    environment:
      NEXT_PUBLIC_DEPLOYMENT_URL: http://127.0.0.1:${PORT_CONVEX_API}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${CONTAINER_PORT_CONVEX_DASHBOARD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - convex-net
volumes:
  postgres_data:
  convex_minio_data:
  convex_data:
networks:
  convex-net:
