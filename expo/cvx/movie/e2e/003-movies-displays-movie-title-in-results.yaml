appId: dev.noboil.mobile.convex.movie
---
- launchApp
- assertVisible:
    id: "movie-search-page"
- tapOn:
    id: "movie-search-input"
- eraseText: 50
- inputText: "Fight Club"
- tapOn:
    id: "movie-search-submit"
- extendedWaitUntil:
    visible:
      id: "movie-results"
    timeout: 15000
- assertVisible:
    id: "movie-results"
- assertVisible:
    id: "movie-title"
